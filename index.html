<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOS System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff4b5c, #ff7a18);
    color: white;
    text-align: center;
  }

  .container {
    padding: 20px;
    max-width: 600px;
    margin: auto;
  }

  h1 { font-size: 70px; margin-top: 30px; }

  button {
    padding: 12px;
    margin: 8px;
    width: 90%;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  .primary { background: white; color: #ff4b5c; font-weight: bold; }
  .secondary { background: transparent; border: 2px solid white; color: white; }

  .hidden { display: none; }

  input {
    padding: 10px;
    width: 90%;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .card {
    background: white;
    color: #ff4b5c;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
  }

  .selected { background: #222; color: white; }

  .request-card {
    text-align: left;
    background: white;
    color: black;
    padding: 15px;
    border-radius: 12px;
    margin: 10px 0;
    position: relative;
  }

  .btn-small {
    width: 48%;
    margin: 5px 1%;
    padding: 8px;
    font-size: 12px;
    border-radius: 6px;
  }

  .accept { background: #3498db; color: white; }
  .done { background: #2ecc71; color: white; }

  .high { border-left: 6px solid #e74c3c; }
  .medium { border-left: 6px solid #f1c40f; }
  .low { border-left: 6px solid #2ecc71; }

  .completed-card {
    opacity: 0.6;
  }

  .completed-card::after {
    content: "✔";
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 26px;
    color: #2ecc71;
    font-weight: bold;
  }

  /* URGENCY UI */
  .urgency-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 15px;
  }

  .urgency {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 90%;
    padding: 14px 16px;
    border-radius: 10px;
    font-weight: 900;
    font-size: 18px;
    cursor: pointer;
    color: white;
  }

  .urgency input {
    transform: scale(1.4);
  }

  .low { background: #2ecc71; }
  .medium { background: #f1c40f; color: #111; }
  .high { background: #e74c3c; }

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="container">
  <h1>SOS</h1>
  <p>Emergency Assistance System</p>

  <button class="primary" onclick="showScreen('step1')">🚨 Request Help</button>
  <button class="secondary" onclick="openDashboard()">🤝 Volunteer Dashboard</button>
</div>

<!-- STEP 1 -->
<div id="step1" class="container hidden">
  <h2>Enter Details</h2>
  <input id="name" placeholder="Enter name or anonymous">

  <button class="secondary" onclick="setAnonymous()">Use Anonymous</button>
  <button class="primary" onclick="showScreen('step2')">Next</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="container hidden">
  <h2>Location & Help Type</h2>

  <input id="location" placeholder="Enter location">

  <div class="grid">
    <div class="card" onclick="selectType(this,'Food')">Food</div>
    <div class="card" onclick="selectType(this,'Medical')">Medical</div>
    <div class="card" onclick="selectType(this,'Rescue')">Rescue</div>
    <div class="card" onclick="selectType(this,'Shelter')">Shelter</div>
  </div>

  <button class="primary" onclick="showScreen('step3')">Next</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="container hidden">
  <h2>Urgency Level</h2>

  <div class="urgency-group">
    <label class="urgency low">
      <input type="radio" name="urgency" value="Low"> Low
    </label>

    <label class="urgency medium">
      <input type="radio" name="urgency" value="Medium"> Medium
    </label>

    <label class="urgency high">
      <input type="radio" name="urgency" value="High"> High
    </label>
  </div>

  <button class="primary" onclick="submitForm()">Submit</button>

  <!-- BACK BUTTON (hidden initially) -->
  <button id="backBtn" class="secondary hidden" onclick="goHome()">
    ⬅ Back to Home
  </button>

  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
  <h2>Volunteer Dashboard</h2>
  <div id="requests"></div>

  <button class="secondary" onclick="goHome()">Back</button>
</div>

<script>

let selectedType = "";

function showScreen(id) {
  document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  if (id !== "step3") {
    document.getElementById("backBtn").classList.add("hidden");
  }
}

function goHome() {
  showScreen('home');
}

function setAnonymous() {
  document.getElementById("name").value = "Anonymous";
}

function selectType(el, type) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = type;
}

function submitForm() {
  const name = document.getElementById("name").value.trim();
  const location = document.getElementById("location").value.trim();
  const urgency = document.querySelector('input[name="urgency"]:checked');

  if (!name || !location || !selectedType || !urgency) {
    document.getElementById("msg").innerText = "❌ No submission allowed: Empty fields";
    return;
  }

  let data = {
    id: Date.now(),
    name: name === "Anonymous" ? "Anonymous" : name,
    location,
    type: selectedType,
    urgency: urgency.value,
    status: "Pending"
  };

  let all = JSON.parse(localStorage.getItem("sos_requests") || "[]");
  all.push(data);
  localStorage.setItem("sos_requests", JSON.stringify(all));

  document.getElementById("msg").innerText = "✅ Submitted successfully!";

  // SHOW BACK BUTTON
  document.getElementById("backBtn").classList.remove("hidden");
}

function openDashboard() {
  showScreen('dashboard');
  loadRequests();
}

function loadRequests() {
  let container = document.getElementById("requests");
  let data = JSON.parse(localStorage.getItem("sos_requests") || "[]");

  container.innerHTML = "";

  data.forEach((r) => {

    let urgencyClass =
      r.urgency === "High" ? "high" :
      r.urgency === "Medium" ? "medium" : "low";

    container.innerHTML += `
      <div class="request-card ${urgencyClass} ${r.status === "Completed" ? "completed-card" : ""}">
        <p><b>Name:</b> ${r.name}</p>
        <p><b>Location:</b> ${r.location}</p>
        <p><b>Help Type:</b> ${r.type}</p>
        <p><b>Urgency:</b> ${r.urgency}</p>
        <p><b>Status:</b> ${r.status}</p>

        <button class="btn-small accept" onclick="acceptRequest(${r.id})">Accept</button>
        <button class="btn-small done" onclick="completeRequest(${r.id})">Completed</button>
      </div>
    `;
  });
}

function updateStorage(data) {
  localStorage.setItem("sos_requests", JSON.stringify(data));
}

function acceptRequest(id) {
  let data = JSON.parse(localStorage.getItem("sos_requests") || "[]");

  data = data.map(r => {
    if (r.id === id) r.status = "Accepted";
    return r;
  });

  updateStorage(data);
  loadRequests();
}

function completeRequest(id) {
  let data = JSON.parse(localStorage.getItem("sos_requests") || "[]");

  data = data.map(r => {
    if (r.id === id) r.status = "Completed";
    return r;
  });

  updateStorage(data);
  loadRequests();
}

</script>

</body>
</html>
